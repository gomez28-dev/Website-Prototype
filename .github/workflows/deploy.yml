name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the Astro site
      - name: Build Astro site
        run: npm run build

      # 5. Install sshpass and rsync
      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      # 6. Deploy dist/ contents to Hostinger via rsync with Password
      - name: Deploy to Hostinger via rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avzr --delete --exclude='ims/' --exclude='_backup_old_site/' -e "ssh -o StrictHostKeyChecking=no -p 22" dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u358921359/domains/doyengroupofcompanies.com/public_html/
